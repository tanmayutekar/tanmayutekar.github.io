<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>404 — tanmayxedits</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;cursor:none!important}
:root{--accent:#0071e3}
html,body{height:100%;background:#000;color:#fff;font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Segoe UI',sans-serif;overflow:hidden}

/* custom cursor */
.cursor{position:fixed;pointer-events:none;z-index:9999;width:12px;height:12px;background:#fff;border-radius:50%;transform:translate(-50%,-50%);transition:width .2s,height .2s;box-shadow:0 0 12px #fff,0 0 30px rgba(255,255,255,.5);}

/* grain */
#grain{position:fixed;inset:0;pointer-events:none;z-index:9998;opacity:.03;mix-blend-mode:screen;}

/* scanlines */
.scanlines{
  position:fixed;inset:0;pointer-events:none;z-index:9;
  background:repeating-linear-gradient(
    to bottom,
    transparent 0px,
    transparent 3px,
    rgba(0,0,0,.08) 3px,
    rgba(0,0,0,.08) 4px
  );
}

/* background */
.bg{
  position:fixed;inset:0;
  background:
    radial-gradient(ellipse 60% 50% at 50% 50%, rgba(0,40,120,.18) 0%, transparent 65%),
    radial-gradient(ellipse 30% 30% at 20% 80%, rgba(100,0,200,.08) 0%, transparent 55%),
    #000;
}

/* glitchy 404 */
.error-num{
  position:fixed;
  top:50%;left:50%;
  transform:translate(-50%,-50%);
  font-size:clamp(200px,28vw,400px);
  font-weight:900;
  letter-spacing:-20px;
  line-height:1;
  color:rgba(255,255,255,.03);
  pointer-events:none;
  user-select:none;
  animation:numDrift 8s ease-in-out infinite;
}
@keyframes numDrift{
  0%,100%{transform:translate(-50%,-50%) skewX(0deg)}
  25%{transform:translate(-50%,-50%) skewX(-.4deg) scale(1.002)}
  75%{transform:translate(-50%,-50%) skewX(.3deg) scale(.998)}
}

/* main content */
.wrap{
  position:relative;z-index:10;
  height:100vh;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  text-align:center;
  padding:24px;
  gap:0;
}

/* glitch tag */
.glitch-tag{
  font-size:11px;font-weight:700;letter-spacing:4px;text-transform:uppercase;
  color:var(--accent);margin-bottom:32px;
  display:flex;align-items:center;gap:10px;
  animation:fadeUp .6s ease both .1s;opacity:0;
}
.glitch-tag::before,.glitch-tag::after{content:'';flex:1;max-width:40px;height:1px;background:var(--accent);}

/* heading */
.heading{
  font-size:clamp(28px,4vw,52px);
  font-weight:800;letter-spacing:-2px;line-height:1.1;
  margin-bottom:20px;
  animation:fadeUp .6s ease both .2s;opacity:0;
}
.heading em{
  font-style:normal;
  -webkit-text-stroke:1px rgba(255,255,255,.25);
  -webkit-text-fill-color:transparent;
}

/* sarcastic messages — cycles through */
.msg{
  font-size:clamp(14px,1.6vw,18px);
  color:rgba(255,255,255,.38);
  line-height:1.7;
  max-width:480px;
  margin-bottom:48px;
  animation:fadeUp .6s ease both .35s;opacity:0;
  min-height:56px;
}
.msg span{color:rgba(255,255,255,.7);}

/* buttons */
.btns{
  display:flex;gap:14px;flex-wrap:wrap;justify-content:center;
  animation:fadeUp .6s ease both .5s;opacity:0;
}
.btn-home{
  padding:13px 32px;border-radius:30px;
  background:var(--accent);color:#fff;
  font-size:14px;font-weight:600;text-decoration:none;
  box-shadow:0 0 30px rgba(0,113,227,.4);
  transition:box-shadow .3s,transform .3s;
}
.btn-home:hover{box-shadow:0 8px 40px rgba(0,113,227,.7);transform:translateY(-2px);}
.btn-back{
  padding:13px 32px;border-radius:30px;
  border:1px solid rgba(255,255,255,.14);color:rgba(255,255,255,.6);
  font-size:14px;font-weight:600;text-decoration:none;
  transition:border-color .3s,color .3s,transform .3s;
}
.btn-back:hover{border-color:rgba(255,255,255,.4);color:#fff;transform:translateY(-2px);}

/* broken pencil SVG animation */
.pencil-wrap{
  margin-bottom:40px;
  animation:fadeUp .6s ease both .15s;opacity:0;
}
.pencil-wrap svg{width:64px;height:64px;overflow:visible;}

/* small error code */
.errcode{
  position:fixed;bottom:32px;left:50%;transform:translateX(-50%);
  font-size:10px;letter-spacing:3px;text-transform:uppercase;
  color:rgba(255,255,255,.1);font-family:monospace;
  animation:fadeUp .6s ease both .7s;opacity:0;
}

/* glitch flicker on heading */
.heading{position:relative;}
.heading::after{
  content:attr(data-text);
  position:absolute;inset:0;
  color:rgba(0,113,227,.4);
  clip-path:polygon(0 30%, 100% 30%, 100% 50%, 0 50%);
  transform:translateX(-2px);
  animation:glitch 6s steps(1) infinite;
}
@keyframes glitch{
  0%,90%,100%{opacity:0}
  91%{opacity:1;transform:translateX(-3px) skewX(-5deg)}
  92%{opacity:1;transform:translateX(3px) skewX(3deg)}
  93%{opacity:0}
  96%{opacity:1;transform:translateX(-2px)}
  97%{opacity:0}
}

@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:none}}

/* horizontal noise bar flicker */
.noise-bar{
  position:fixed;pointer-events:none;z-index:8;
  left:0;right:0;height:2px;
  background:rgba(0,113,227,.6);
  box-shadow:0 0 8px rgba(0,113,227,.8);
  animation:noiseBar 7s linear infinite;
  opacity:0;
}
@keyframes noiseBar{
  0%,100%{opacity:0;top:-2px}
  5%{opacity:1;top:0%}
  15%{opacity:0;top:30%}
  16%{opacity:1;top:30%}
  20%{opacity:0;top:60%}
  21%{opacity:1;top:60%}
  25%{opacity:0;top:100%}
}
</style>
</head>
<body>

<div class="cursor" id="cur"></div>
<canvas id="grain"></canvas>
<div class="scanlines"></div>
<div class="bg"></div>
<div class="noise-bar"></div>
<div class="error-num">404</div>

<div class="wrap">

  <div class="glitch-tag">Error 404</div>

  <!-- broken pencil / empty canvas icon -->
  <div class="pencil-wrap">
    <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
      <!-- canvas frame -->
      <rect x="8" y="10" width="48" height="36" rx="3" stroke="rgba(255,255,255,.15)" stroke-width="1.5"/>
      <!-- broken pencil -->
      <line x1="20" y1="52" x2="32" y2="38" stroke="rgba(255,255,255,.3)" stroke-width="2" stroke-linecap="round"/>
      <line x1="32" y1="38" x2="44" y2="52" stroke="rgba(255,255,255,.15)" stroke-width="2" stroke-linecap="round" stroke-dasharray="3 3"/>
      <!-- crack in canvas -->
      <path d="M26 22 L32 28 L30 34" stroke="rgba(0,113,227,.4)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      <!-- x eyes in canvas -->
      <line x1="22" y1="20" x2="26" y2="24" stroke="rgba(255,255,255,.2)" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="26" y1="20" x2="22" y2="24" stroke="rgba(255,255,255,.2)" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="36" y1="20" x2="40" y2="24" stroke="rgba(255,255,255,.2)" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="40" y1="20" x2="36" y2="24" stroke="rgba(255,255,255,.2)" stroke-width="1.5" stroke-linecap="round"/>
    </svg>
  </div>

  <h1 class="heading" data-text="Sorry, our developer forgot to draw here.">
    Sorry, our developer<br><em>forgot to draw here.</em>
  </h1>

  <p class="msg" id="msg">Loading excuse...</p>

  <div class="btns">
    <a href="index.html" class="btn-home">← Take Me Home</a>
    <a href="javascript:history.back()" class="btn-back">Go Back</a>
  </div>

</div>

<div class="errcode">tanmayxedits · 404 · page_not_found</div>

<script>
// ── cursor ──
const cur = document.getElementById('cur');
document.addEventListener('mousemove', e => {
  cur.style.left = e.clientX + 'px';
  cur.style.top  = e.clientY + 'px';
});

// ── grain ──
(function(){
  const c = document.getElementById('grain');
  c.style.cssText = 'position:fixed;inset:0;width:100%;height:100%;pointer-events:none;z-index:9998;opacity:.032;mix-blend-mode:screen;';
  const ctx = c.getContext('2d');
  let w,h,f=0;
  function resize(){w=c.width=innerWidth;h=c.height=innerHeight;}
  resize(); addEventListener('resize',resize);
  (function loop(){f++;if(f%2===0){const d=ctx.createImageData(w,h);for(let i=0;i<d.data.length;i+=4){const v=Math.random()*255|0;d.data[i]=d.data[i+1]=d.data[i+2]=v;d.data[i+3]=255;}ctx.putImageData(d,0,0);}requestAnimationFrame(loop);})();
})();

// ── rotating sarcastic messages ──
const msgs = [
  `Our developer said <span>"I'll do it later"</span>… in 2021.`,
  `This page is under construction. The construction crew quit. Twice.`,
  `404: Page not found.<br>Developer found though — asleep at his desk.`,
  `We asked the designer for this page.<br>He sent back a <span>blank canvas.</span> Literally.`,
  `Nothing here yet.<br>But the loading spinner looks <span>really nice</span>, doesn't it?`,
  `Oops. Looks like someone<br>forgot to <span>export the final file.</span>`,
  `This page exists in the timeline<br>where our developer <span>actually finished his tasks.</span>`,
];
let i = 0;
const el = document.getElementById('msg');
function cycle(){
  el.style.transition='opacity .4s ease';
  el.style.opacity='0';
  setTimeout(()=>{
    el.innerHTML = msgs[i % msgs.length];
    el.style.opacity='1';
    i++;
  },400);
}
setTimeout(()=>{cycle(); setInterval(cycle, 3800);}, 600);
</script>

</body>
</html>
